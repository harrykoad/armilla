<style>
body{color-scheme: dark light; font-family: sans-serif; margin: 0; overflow: hidden; touch-action: none}
canvas{cursor: grab; display: block; touch-action: none}
canvas:active{cursor: grabbing}
#leftPanel, #rightPanel{color: white; font-size: 12px; position: absolute; top: 10px; width: 200px;
	user-select: none; -moz-user-select: none; -ms-user-select: none; -webkit-user-select: none}
#leftPanel{left: 10px}
#rightPanel{right: 10px}
.box{background: black; border-radius: 10px; border: 1px solid gray; margin-bottom: 10px; padding: 8px}
.columns{column-gap: 0; display: grid; grid-template-columns: 45% 55%; margin-top: 2px; row-gap: 2px}
#orientationDropdown{background: black; border-radius: 5px; border: 1px solid gray;
	color: white; margin-bottom: 5px; padding: 2px 4px}
.checkboxLabel{align-items: center; display: flex; gap: 2px}
.colorLegend{border-radius: 50%; border: 1.5px solid white; display: inline-block; height: 12.5px;
	margin-bottom: 5px; margin-right: 5px; vertical-align: middle; width: 12.5px}
.horizontalLine{border-top: 1px solid gray; display: inline-block; height: 0; vertical-align: middle;
	width: 100%}
input[type="checkbox"]{accent-color: currentColor}
input[type="range"]{accent-color: currentColor; height: 15px; width: 100%}
.sliderContainer{display: flex; flex-direction: column}
.sliderMarks{color: gray; display: flex; font-size: 10px; height: 10px; justify-content: space-between}
.button{background: #3b3b3b; border-radius: 6px; border: 1px solid gray; color: white; cursor: pointer;
	font-size: 11px; height: 18px; padding: 0; text-align: center; width: 50px}
</style>

<body>

<div id="leftPanel">

<div class="box">

<label>&nbsp;Orientation&nbsp;
<select id="orientationDropdown" style="background: #3b3b3b; color: white">
	<option value="ecliptic">Ecliptic</option>
	<option value="equatorial">Equatorial</option>
	<option value="horizontal" selected>Horizontal</option>
</select></label>

<label class="checkboxLabel"><input type="checkbox" id="starsCheckbox" checked>Stars</label>

<label class="checkboxLabel"><input type="checkbox" id="horizontalMeridianCheckbox">0° Meridian</label>

<label class="checkboxLabel"><input type="checkbox" id="moonCheckbox" checked>Moon</label>

<input type="range" id="yearSlider" min="-4999" max="5000" step="1" value="2000">

<button id="hereButton" class="button" style="float:right">HERE</button>

</div>

<div class="box">

<div class="columns" style="grid-template-columns: 50% 50%">
<label style="text-align:right">Ayanāṃśa:&nbsp;</label><span id="ayanamsaValue">N/A</span>
<label style="text-align:right">Obliquity:&nbsp;</label><span id="obliquityValue">N/A</span>
</div>

<span class="horizontalLine"></span>

<div class="columns" style="grid-template-columns: 50% 50%">
<label style="text-align:right">Julian Day:&nbsp;</label><span id="julianDayValue">N/A</span>
<label style="text-align:right">Sidereal Time:&nbsp;</label><span id="siderealValue">N/A</span>
</div>

</div>

<div class="box">

<div class="columns" style="grid-template-columns: 50% 50%">
<label style="text-align:right">Ecliptic Lon.:&nbsp;</label><span id="eclipticLongitudeValue">N/A</span>
<label style="text-align:right">Ecliptic Lat.:&nbsp;</label><span id="eclipticLatitudeValue">N/A</span>
</div>

<span class="horizontalLine"></span>

<div class="columns" style="grid-template-columns: 50% 50%">
<label style="text-align:right">Right Asc.:&nbsp;</label><span id="rightAscensionValue">N/A</span>
<label style="text-align:right">Declination:&nbsp;</label><span id="declinationValue">N/A</span>
</div>

<span class="horizontalLine"></span>

<div class="columns" style="grid-template-columns: 50% 50%">
<label style="text-align:right">Azimuth:&nbsp;</label><span id="azimuthValue">N/A</span>
<label style="text-align:right">Altitude:&nbsp;</label><span id="altitudeValue">N/A</span>
</div>

</div>

</div>

<canvas id="sky"></canvas>

<script>

const UI = new Proxy({}, {get(obj, id) {if(!obj[id]) obj[id] = document.getElementById(id); return obj[id]}})
const ctx = UI.sky.getContext("2d")

const mode = {orientation: "horizontal", darkTheme: true, draw: false}
const show = {sphere: true, stars: true, milkyWay: true, constellations: true, zodiac: true,
	ecliptic: true, eclipticAxes: true, eclipticMeridian: false, eclipticGraticule: false, precessionCircles: false,
	equator: true, equatorialAxes: true, equatorialMeridian: false, equatorialGraticule: false, circumpolarCircles: false,
	horizon: true, horizontalAxes: true, horizontalMeridian: false, horizontalGraticule: true, observerMeridian: false,
	sun: true, moon: true, planets: false, analemma: false, moonsOrbit: false, eclipses: false}
const update = {params: true, view: true, sphere: true, canvas: true}
const astro = {year: 2000, month: 1, day: 1, localtime: 180, dayOfYear: 1, totalDays: 366,
	latitude: 8.64, longitude: 99.90, timeZone: 7, julianCentury: 0, sidereal: 0,
	ayanamsa: 0, ayanamsaJ2000: 0, obliquity: 0, obliquityJ2000: 0, observerVector: [0, 0, 0]}
const transform = {fromNirayana: null, toNirayana: null, fromEquatorialJ2000: null,
	fromHorizontal: null, toHorizontal: null};
const wgs84 = {f: 1 / 298.257223563, a: 6378.137, /* f * (2 - f) */e2: 0.00669438}
const graphics = {backLines: [], backStars: [], backPoints: [], backTexts: [],
	frontLines: [], frontStars: [], frontPoints: [], frontTexts: []}
const input = {dragging: false, lastX: 0, lastY: 0, drawing: false, drawPath: [],
	activePointers: new Map(), pinchStartDist: null}
const view = {w: 200, h: 100, f: 10, /* w / 2 */x0: 100, /* h / 2 */y0: 50, /* 1 / f */z0: 0.1,
	/* 0.45 * min(w, h) */r0: 45, yaw: 0, pitch: 0, roll: 0, orienting: false}
const viewTransform = {toScreen: null, fromScreen: null}

const TWO_PI = 2 * Math.PI
const DEGREE = Math.PI / 180
const KM_PER_AU = 149597870.7

const ecliptic_major_color = "red"
const ecliptic_minor_color = "#c76b6b"
const equatorial_major_color = "blue"
const equatorial_minor_color = "#556bbf"
const horizontal_major_color = "#00aa00"
const horizontal_minor_color = "#6abf86"

UI.eclipticLegend.style.background = ecliptic_major_color
UI.equatorialLegend.style.background = equatorial_major_color
UI.horizontalLegend.style.background = horizontal_major_color

function mod(m, n, d = 0) {return ((m - d) % n + n) % n + d}
function clip(n, min, max) {return Math.max(min, Math.min(max, n))}

function toDMS(degree, range = 360, offset = 0, decimal = 2) {
	let t = mod(degree, range, offset)
	let sign = t < 0 ? -1 : 1
	t = Math.abs(t)
	let d = Math.floor(t)
	let m = Math.floor(60 * (t - d))
	let s = 60 * (60 * (t - d) - m)
	let f = 10 ** decimal
	s = Math.round(s * f) / f
	s === 60 ? (s = 0, m += 1) : null;
	m === 60 ? (m = 0, d += 1) : null;
	return [mod(sign * d, range, offset), sign * m, sign * s]}

function formatTime(degree) {
	let [h, m, s] = toDMS(degree / 15, 24)
	h = String(h).padStart(2, "0")
	m = String(m).padStart(2, "0")
	return h + ":" + m}

function formatHourAngle(degree, decimal) {
	let [h, m, s] = toDMS(degree / 15, 24, 0, decimal)
	return h + "ʰ " + m + "ᵐ " + s.toFixed(decimal) + "ˢ"}

function formatAngleDecimal(degree, decimal) {
	return mod(degree, 360).toFixed(decimal) + "°"}

function formatAngleDMS(degree, decimal) {
	let [d, m, s] = toDMS(degree, 360, 0, decimal)
	return d + "° " + m + "\' " + s.toFixed(decimal) + "\""}

function formatSignedAngleDecimal(degree, decimal) {
	let t = mod(degree, 360, -180, decimal)
	let f = 10 ** decimal
	let a = Math.round(Math.abs(t) * f) / f
	if(a === 0) return (0).toFixed(decimal)
	return (t > 0 ? "+" : "−") + a.toFixed(decimal) + "°"}

function formatSignedAngleDMS(degree, decimal) {
	let t = mod(degree, 360, -180, decimal)
	let [d, m, s] = toDMS(Math.abs(t), 360, -180, decimal)
	let sign = t < 0 ? "−" : (t > 0 ? "+" : "")
	return sign + d + "° " + m + "\' " + s.toFixed(decimal) + "\""}

function getJulianDay(year, month, day, localtime) {
	let [h, m, s] = toDMS(localtime / 15, 24)
	let a = Math.floor((14 - month) / 12)
	let Y = year + 4800 - a
	let M = month + 12 * a - 3
	return Math.floor(Y / 4) - Math.floor(Y / 100) + Math.floor(Y / 400) +
		365 * Y + Math.floor((153 * M + 2) / 5) + day - 32045.5 + 
		(h - astro.timeZone) / 24 + m / 1440 + s / 86400}

function getSidereal(julianCentury) {
	let jc = julianCentury
	return mod(mod(280.46061837504 + 13184999.4888224000575 * jc, 360) +
		astro.longitude + (0.014506 + jc * (4612.156534 + jc * (1.3915817 - jc *
		(0.00000044 + jc * (0.000029956 + jc * 0.0000000368))))) / 3600, 360)}

function getAyanamsa(julianCentury) {
	let jc = julianCentury
	return - jc * (5028.796195 + jc * (1.1054348 + jc * (0.00007964 - jc *
		(0.000023857 + jc * 0.0000000383)))) / 3600 - 20.8841929311}

function getObliquity(julianCentury) {
	let jc = julianCentury
	return 23.4392794444 - jc * (46.836769 + jc * (0.0001831 - jc *
		(0.0020034 - jc * (0.000000576 + jc * 0.0000000434)))) / 3600}

astro.ayanamsaJ2000 = getAyanamsa(0)
astro.obliquityJ2000 = getObliquity(0)

function toXYZ(theta, phi) {
	theta *= DEGREE
	phi *= DEGREE
	let c = Math.cos(phi)
	return [c * Math.cos(theta), c * Math.sin(theta), Math.sin(phi)]}

function toTP(xyz) {
	let p = Math.asin(clip(xyz[2], -1, 1)) / DEGREE
	if(Math.abs(xyz[2]) === 1) return [0, p]
	let t = mod(Math.atan2(xyz[1], xyz[0]) / DEGREE, 360)
	return [t, p]}

function normalize(vector) {
	let r = Math.hypot(vector[0], vector[1], vector[2])
	if(r === 0) return [0, 0, 0]
	return [vector[0] / r, vector[1] / r, vector[2] / r]}

function dot(m, v) {return [
	m[0]*v[0] + m[1]*v[1] + m[2]*v[2],   m[3]*v[0] + m[4]*v[1] + m[5]*v[2],   m[6]*v[0] + m[7]*v[1] + m[8]*v[2]]}

function mul(a, b) {return [
	a[0]*b[0] + a[1]*b[3] + a[2]*b[6],   a[0]*b[1] + a[1]*b[4] + a[2]*b[7],   a[0]*b[2] + a[1]*b[5] + a[2]*b[8],
	a[3]*b[0] + a[4]*b[3] + a[5]*b[6],   a[3]*b[1] + a[4]*b[4] + a[5]*b[7],   a[3]*b[2] + a[4]*b[5] + a[5]*b[8],
	a[6]*b[0] + a[7]*b[3] + a[8]*b[6],   a[6]*b[1] + a[7]*b[4] + a[8]*b[7],   a[6]*b[2] + a[7]*b[5] + a[8]*b[8]]}

function rotateX(angle) {
	angle *= DEGREE;
	let c = Math.cos(angle), s = Math.sin(angle)
	return [1, 0, 0,   0, c, -s,   0, s, c]}

function rotateY(angle) {
	angle *= DEGREE;
	let c = Math.cos(angle), s = Math.sin(angle)
	return [c, 0, s,   0, 1, 0,   -s, 0, c]}

function rotateZ(angle) {
	angle *= DEGREE;
	let c = Math.cos(angle), s = Math.sin(angle)
	return [c, -s, 0,   s, c, 0,   0, 0, 1]}

function updateTransforms() {
	transform.fromNirayana = mul(rotateX(astro.obliquity), rotateZ(-astro.ayanamsa))
	transform.toNirayana = mul(rotateZ(astro.ayanamsa), rotateX(-astro.obliquity))
	transform.fromEquatorialJ2000 = mul(rotateZ(astro.ayanamsaJ2000), rotateX(-astro.obliquityJ2000))
	transform.fromHorizontal = mul(rotateZ(90 + astro.sidereal), rotateX(90 - astro.latitude))
	transform.toHorizontal = mul(rotateX(-(90 - astro.latitude)), rotateZ(-(90 + astro.sidereal)))}

const fromNirayana = p => dot(transform.fromNirayana, p)
const toNirayana = p => dot(transform.toNirayana, p)
const fromEquatorialJ2000 = p => dot(transform.fromEquatorialJ2000, p)
const fromHorizontal = p => dot(transform.fromHorizontal, p)
const toHorizontal = p => dot(transform.toHorizontal, p)

function getObserverVector(sidereal) {
	let p = astro.latitude * DEGREE
	let t = sidereal * DEGREE
	let sp = Math.sin(p), cp = Math.cos(p)
	let r = wgs84.a / Math.sqrt(1 - wgs84.e2 * sp * sp)
	return toNirayana([r * cp * Math.cos(t), r * cp * Math.sin(t),
		r * (1 - wgs84.e2) * sp].map(n => n / KM_PER_AU))}

function updateTime() {
	UI.timeValue.textContent = formatTime(astro.localtime)
	let jd = getJulianDay(astro.year, astro.month, astro.day, astro.localtime)
	UI.dayOfWeekValue.textContent = ["Sunday", "Monday",
		"Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"][
				mod(Math.floor(jd + astro.timeZone / 24 + 1.5), 7)]
	let jc = (jd - 2451545) / 36525
	astro.julianCentury = jc
	astro.ayanamsa = getAyanamsa(jc)
	astro.obliquity = getObliquity(jc)
	astro.sidereal = getSidereal(jc)
	UI.ayanamsaValue.textContent = formatSignedAngleDecimal(astro.ayanamsa, 5)
	UI.obliquityValue.textContent = formatSignedAngleDecimal(astro.obliquity, 5)
	UI.julianDayValue.textContent = jd.toFixed(5)
	UI.siderealValue.textContent = formatHourAngle(astro.sidereal, 2)
	updateTransforms()
	astro.observerVector = getObserverVector(astro.sidereal)}

function updateDayOfYear() {
	let days = [31, astro.totalDays === 366 ? 29 : 28, 31, 30, 31, 30, 31, 31, 30, 31, 30, 31]
	let d = astro.dayOfYear
	astro.month = 1
	while(d > days[astro.month - 1]) {d -= days[astro.month - 1]; astro.month++}
	astro.day = d
	UI.dayOfYearValue.textContent = ["January", "February", "March", "April", "May",
		"June", "July", "August", "September", "October", "November", "December"][
				astro.month - 1] + " " + astro.day
	updateTime()}

function getTotalDays() {
	return (astro.year % 4 === 0 && astro.year % 100 !== 0) || (astro.year % 400 === 0) ? 366 : 365}

function updateYear() {
	UI.yearValue.textContent = astro.year > 0 ? "AD " + astro.year : Math.abs(astro.year - 1) + " BC"
	let td = getTotalDays()
	if(astro.dayOfYear > 59) {
		let d = td - astro.totalDays
		if(d !== 0) astro.dayOfYear += d > 0 ? 1 : -1
	}
	astro.totalDays = td
	UI.dayOfYearSlider.max = astro.totalDays
	updateDayOfYear()}

function setDateTime() {
	let dt = new Date()
	astro.year = dt.getFullYear()
	UI.yearSlider.value = astro.year
	astro.totalDays = getTotalDays()
	let days = [31, astro.totalDays === 366 ? 29 : 28, 31, 30, 31, 30, 31, 31, 30, 31, 30, 31]
	astro.month = dt.getMonth() + 1
	astro.day = dt.getDate()
	astro.dayOfYear = astro.day
	for(let i = 0; i < astro.month - 1; i++) astro.dayOfYear += days[i]
	UI.dayOfYearSlider.value = astro.dayOfYear
	astro.localtime = Math.round(15 * (dt.getHours() + dt.getMinutes() / 60))
	UI.timeSlider.value = astro.localtime
	updateYear()}

setDateTime()

function formatLatitude() {
	let l = astro.latitude
	if(Math.abs(l) < 0.005) return "0.00°"
	return Math.abs(l).toFixed(2) + "° " + (l > 0 ? "N" : "S")}

function formatLongitude() {
	let l = astro.longitude
	if(Math.abs(l) < 0.005) return "0.00°"
	if(Math.abs(Math.abs(l) - 180) < 0.005) return "180.00°"
	return Math.abs(l).toFixed(2) + "° " + (l > 0 ? "E" : "W")}

function formatTimeZone() {
	if(astro.timeZone === 0) return "UTC"
	return "UTC" + (astro.timeZone >= 0 ? "+" : "−") + Math.abs(astro.timeZone)}

function setLocation() {
	navigator.geolocation.getCurrentPosition(pos => {
		astro.latitude = Math.round(mod(pos.coords.latitude, 180, -90) * 100) / 100
		astro.longitude = Math.round(mod(pos.coords.longitude, 360, -180) * 100) / 100
		UI.latitudeSlider.value = astro.latitude
		UI.longitudeSlider.value = astro.longitude
		UI.latitudeValue.textContent = formatLatitude()
		UI.longitudeValue.textContent = formatLongitude()
		astro.timeZone = Math.round(astro.longitude / 15)
		UI.timeZoneValue.textContent = formatTimeZone()
		updateTime()
		update.params = true
		render()
	}, error => alert("Location access failed."))}

function changeSystem(point, fromMode, toMode) {
	if(fromMode === "horizontal") point = fromHorizontal(point)
	else if(fromMode === "ecliptic") point = fromNirayana(point)
	if(toMode === "horizontal") return toHorizontal(point)
	else if(toMode === "ecliptic") return toNirayana(point)
	else return point}

function updateViewTransforms() {
	let m = mul(rotateY(view.pitch), rotateZ(view.yaw))
	if (view.orienting) m = mul(rotateX(view.roll), m)
	viewTransform.toScreen = m
	let n = mul(rotateZ(-view.yaw), rotateY(-view.pitch))

function toScreen(point, fromMode, toMode) {
	return dot(viewTransform.toScreen, changeSystem(point, fromMode, toMode))}

function fromScreen(point, fromMode, toMode) {
	return changeSystem(dot(viewTransform.fromScreen, point), fromMode, toMode)}

function project(p) {
	let camera3D = toScreen(p, "equatorial", mode.orientation)
	let s = view.r0 * view.f / (view.f - camera3D[0])
	let screen2D = [view.x0 + camera3D[1] * s, view.y0 - camera3D[2] * s]
	return [camera3D, screen2D]}

function pushLines(points, color, width, dash = []) {
	let segment = []
	let side = null

	function flush() {
		if(segment.length < 2) {segment = []; return}
		let line = {pts: segment, color, width, dash}
		if(side) graphics.frontLines.push(line)
		else if(!show.sphere) graphics.backLines.push(line)
		segment = []}

	for(let p of points) {
		let [c3D, s2D] = project(p)
		let currentSide = c3D[0] >= view.z0
		if(side === null) side = currentSide
		if(currentSide !== side) {
			let prev = segment[segment.length - 1]
			if(prev) {
				let mid = [(prev[0] + s2D[0]) * 0.5, (prev[1] + s2D[1]) * 0.5]
				segment.push(mid)
				flush()
				segment = [mid]}
			side = currentSide}
		segment.push(s2D)}
	flush()}

	let pts = []
	for(let p = -phi0; p <= phi0; p += 2) pts.push(toXYZ(theta, p))
	return pts}

function parallel(phi) {
	let pts = []
	for(let t = 0; t <= 360; t += 2) pts.push(toXYZ(t, phi))
	return pts}

for(let t = 0; t < 360; t += 30) {

	GRATICULE.push(meridian(t, p0))}

	if(p === -90 || p === 90) continue
	GRATICULE.push(parallel(p))}

		let rp = fromNirayana(p)

		if(show.stars) {

	return a * (1 - e * e) / (1 + e * Math.cos(trueAnomaly * DEGREE))}

	let M = meanAnomaly * DEGREE
	let E = M
	for(let k = 0; k < 6; k++)

	return 2 * Math.atan2(

function solarSystemVectors(julianCentury) {

function analemmaVectors() {
	let pts = []

function pushLagna() {
	let m = mul(transform.toHorizontal, transform.fromNirayana)
	let l = mod(Math.atan2(-m[6], m[7]) / DEGREE, 360)
	let p = normalize(dot(m, toXYZ(l, 0)))
	if(p[0] < 0) p = [-p[0], -p[1], -p[2]]
	let [c3D, s2D] = project(fromHorizontal(p))
	let c = mode.darkTheme ? "white" : "black"
	let point = {pos: s2D, size: 6, color: horizontal_major_color, border: 2, edge: c}
	let text = {pos: [s2D[0], s2D[1]], text: "Lagna", color: c}
	if(c3D[0] >= view.z0) {
		graphics.frontPoints.push(point)
		graphics.frontTexts.push(text)}
	else if(!show.sphere) {
		graphics.backPoints.push(point)
		graphics.backTexts.push(text)}}

function drawLines(lines) {
	for(let l of lines) {
		ctx.strokeStyle = l.color
		ctx.lineWidth = l.width
		ctx.setLineDash(l.dash || [])
		ctx.beginPath()
		ctx.moveTo(l.pts[0][0], l.pts[0][1])
		for(let i = 1; i < l.pts.length; i++)
			ctx.lineTo(l.pts[i][0], l.pts[i][1])
		ctx.stroke()}
	ctx.setLineDash([])}

function drawStars(stars) {
	let r = view.r0 * view.f / Math.sqrt(view.f * view.f - 1)
	ctx.fillStyle = mode.darkTheme ? "white" : "black"
	for(let s of stars) {
		let x = s.pos[0]
		let y = s.pos[1]
		let dx = x - view.x0
		let dy = y - view.y0
		if(dx * dx + dy * dy > r * r) continue
		let size = 5 - s.mag
		if(size < 3) {
			ctx.fillRect(Math.round(x - size * 0.5),
				Math.round(y - size * 0.5), size, size)}
		else {
			ctx.beginPath()
			ctx.arc(x, y, size * 0.5, 0, TWO_PI)
			ctx.fill()}}}

function drawPoints(points) {
	for(let p of points) {
		ctx.beginPath()
		ctx.arc(p.pos[0], p.pos[1], p.size || 3, 0, TWO_PI)
		ctx.fillStyle = p.color || "white"
		ctx.fill()
		if(p.edge) {
			ctx.lineWidth = p.border || 1
			ctx.strokeStyle = p.edge
			ctx.stroke()}}}

function drawTexts(texts) {
	ctx.font = "16px sans-serif"
	ctx.textAlign = "center"
	ctx.textBaseline = "middle"
	for(let t of texts) {
		let x = t.pos[0]
		let y = t.pos[1]
		let dx = x - view.x0
		let dy = y - view.y0
		let len = Math.hypot(dx, dy)
		if(len < 1e-6) {dx = 0; dy = -1; len = 1}
		dx /= len
		dy /= len
		let m = ctx.measureText(t.text)
		let r = 10
		let xt = x + dx * (r + m.width / 2)
		let yt = y + dy * (r +
			(m.actualBoundingBoxAscent + m.actualBoundingBoxDescent) / 2)
		ctx.fillStyle = t.color
		ctx.fillText(t.text, xt, yt)}}

function drawSphere() {
	let r = view.r0 * view.f / Math.sqrt(view.f * view.f - 1)
	ctx.fillStyle = mode.darkTheme ? "black" : "white"
	ctx.beginPath()
	ctx.arc(view.x0, view.y0, r, 0, TWO_PI)
	ctx.fill()
	ctx.strokeStyle = "gray"
	ctx.lineWidth = 1
	ctx.beginPath()
	ctx.arc(view.x0, view.y0, r, 0, TWO_PI)
	ctx.stroke()}

function drawPath() {
	ctx.strokeStyle = "magenta"
	ctx.lineWidth = 2.5
	for(let p of input.drawPath) {
		if(p.length < 2) continue
		ctx.beginPath()
		ctx.moveTo(p[0][0], p[0][1])
		for(let i = 1; i < p.length; i++) ctx.lineTo(p[i][0], p[i][1])
		ctx.stroke()}}

function drawCrosshair() {
	ctx.strokeStyle = "gray"
	ctx.lineWidth = 1.5
	ctx.beginPath()
	let r = 5
	ctx.moveTo(view.x0 - r, view.y0 - r)
	ctx.lineTo(view.x0 + r, view.y0 + r)
	ctx.moveTo(view.x0 - r, view.y0 + r)
	ctx.lineTo(view.x0 + r, view.y0 - r)
	ctx.stroke()

	let p = fromScreen([1, 0, 0], mode.orientation, "equatorial")
	let [ra, dec] = toTP(p)
	let [l, b] = toTP(toNirayana(p))
	let [azm, alt] = toTP(toHorizontal(p))
	azm = Math.abs(alt) === 90 ? 0 : 90 - azm
	UI.eclipticLongitudeValue.textContent = formatAngleDMS(l, 2)
	UI.eclipticLatitudeValue.textContent = formatSignedAngleDMS(b, 2)
	UI.rightAscensionValue.textContent = formatHourAngle(ra, 2)
	UI.declinationValue.textContent = formatSignedAngleDMS(dec, 2)
	UI.azimuthValue.textContent = formatAngleDMS(azm, 2)
	UI.altitudeValue.textContent = formatSignedAngleDMS(alt, 2)}

function resize() {
	let dpr = window.devicePixelRatio || 1
	view.w = window.innerWidth
	view.h = window.innerHeight
	UI.sky.width = view.w * dpr
	UI.sky.height = view.h * dpr
	UI.sky.style.width = view.w + "px"
	UI.sky.style.height = view.h + "px"
	ctx.setTransform(dpr, 0, 0, dpr, 0, 0)
	view.x0 = 0.5 * view.w
	view.y0 = 0.5 * view.h
	view.r0 = 0.45 * Math.min(view.w, view.h)}

function render() {
	if(update.view) {updateViewTransforms(); update.view = false}
	if(update.params) {updateTime(); update.params = false; update.sphere = true}
	if(update.sphere) {update.sphere = false; update.canvas = true}
	if(!update.canvas) return
	update.canvas = false

	for(let g in graphics) graphics[g].length = 0
	
	if(show.eclipticGraticule) pushGraticule(fromNirayana, ecliptic_minor_color)
	if(show.equatorialGraticule) pushGraticule(p => p, equatorial_minor_color)
	if(show.horizontalGraticule) pushGraticule(fromHorizontal, horizontal_minor_color)
	
	if(show.milkyWay) {
		let r = p => fromNirayana(fromEquatorialJ2000(
				dot(mul(rotateZ(282.85948), mul(rotateX(62.87175), rotateZ(-32.93314))), p)))
		pushLines(parallel(0).map(r), "#aaaa00", 3, [3, 3])
		pushAxes([AXES[0]], ["Sgr A*"], r, "#aaaa00", 5)}
	if(show.precessionCircles) {
		pushLines(parallel(90 - astro.obliquity).map(fromNirayana), ecliptic_major_color, 2, [5, 5])
		pushLines(parallel(astro.obliquity - 90).map(fromNirayana), ecliptic_major_color, 2, [5, 5])}
	if(show.circumpolarCircles) {
		pushLines(parallel(90 - astro.latitude), equatorial_major_color, 2, [5, 5])
		pushLines(parallel(astro.latitude - 90), equatorial_major_color, 2, [5, 5])}

	if(show.ecliptic) pushLines(parallel(0).map(fromNirayana), ecliptic_major_color, 3)
	if(show.eclipticMeridian) pushLines(meridian(0).map(fromNirayana), ecliptic_major_color, 3)
	if(show.equator) pushLines(parallel(0), equatorial_major_color, 3)
	if(show.equatorialMeridian) pushLines(meridian(0), equatorial_major_color, 3)
	if(show.horizon) pushLines(parallel(0).map(fromHorizontal), horizontal_major_color, 3)
	if(show.horizontalMeridian) pushLines(meridian(90).map(fromHorizontal), horizontal_major_color, 3)
	if(show.observerMeridian) pushLines(meridian(astro.sidereal), horizontal_major_color, 3)
	if(show.analemma) pushLines(analemmaVectors(), "red", 2, [5, 5])

	if(show.eclipticAxes) {
		pushAxes(AXES, ["VE", "AE", "SS", "WS", "NEP", "SEP"], 
			p => dot(rotateX(astro.obliquity), p), ecliptic_major_color, 5)
		pushAxes([AXES[0]], ["FPA"], fromNirayana, ecliptic_major_color, 5)}
	if(show.equatorialAxes)
		pushAxes(AXES, ["VE", "AE", "6ʰ", "18ʰ", "NCP", "SCP"], 
			p => p, equatorial_major_color, 5)
	if(show.horizontalAxes) {
		pushAxes(AXES, ["East", "West", "North", "South", "Zenith", "Nadir"], 
			fromHorizontal, horizontal_major_color, 5)
		pushLagna()}

	if(show.stars || show.constellations || show.zodiac) pushStars()
	if(show.sun || show.moon || show.planets || show.moonsOrbit || show.eclipses) pushSolarSystem()

	ctx.fillStyle = mode.darkTheme ? "black" : "white"
	ctx.fillRect(0, 0, view.w, view.h)
	if(!show.sphere) {
		drawLines(graphics.backLines)
		drawStars(graphics.backStars)
		drawPoints(graphics.backPoints)
		drawTexts(graphics.backTexts)}
	if(show.sphere) drawSphere()
	drawLines(graphics.frontLines)
	drawStars(graphics.frontStars)
	drawPoints(graphics.frontPoints)
	drawTexts(graphics.frontTexts)

	drawPath()
	drawCrosshair()
}

UI.orientationDropdown.onchange = () => {
	view.orienting = true
	input.dragging = false
	input.activePointers.clear()
	input.pinchStartDist = null

	let oldMode = mode.orientation
	let newMode = UI.orientationDropdown.value
	if(oldMode === newMode) return

	let label = UI.analemmaCheckbox.parentElement
	if(newMode === "horizontal") {
		UI.analemmaCheckbox.disabled = false
		label.style.color = mode.darkTheme ? "white" : "black"}
	else {
		UI.analemmaCheckbox.disabled = true
		UI.analemmaCheckbox.checked = false
		show.analemma = false
		label.style.color = "gray"}

	let a0 = 0; a1 = 0
	let p = toScreen([0, 0, 1], newMode, oldMode)
	if(p[1] !== 0 && p[2] !== 0) a1 = Math.atan2(p[1], p[2]) / DEGREE

	function animate() {
		a0 += 0.05
		if(a0 > 1) a0 = 1
		let k = a0 * a0 * (3 - 2 * a0)
		view.roll = a1 * k
		update.view = true
		update.canvas = true
		render()
		if(a0 < 1) {requestAnimationFrame(animate); return}

		let [t, p] = toTP(fromScreen([1, 0, 0], oldMode, newMode))
		view.yaw = mod(-t, 360)
		view.pitch = p
		view.roll = 0
		view.orienting = false
		mode.orientation = newMode
		
		update.view = true
		update.canvas = true
		render()}

	animate()}

function setupSlider(slider) {
	slider.addEventListener("wheel", e => {
		e.preventDefault()
		let min = parseFloat(slider.min)
		let max = parseFloat(slider.max)
		let current = parseFloat(slider.value)
		let range = max - min
		let baseStep = parseFloat(slider.step)
		let n = Math.round(Math.sqrt(range / baseStep))
		let step = e.shiftKey ? (range / n) : baseStep
		let dir = Math.sign(e.deltaY)
		if((dir > 0 && current <= min) || (dir < 0 && current >= max)) return
		let value = min + Math.round((current - dir * step - min) / baseStep) * baseStep
		if(value < min) value = min
		if(value > max) value = max
		value = parseFloat(value.toFixed(10))
		if(value === current) return
		slider.value = value
		slider.dispatchEvent(new Event("input"))})}

		return}
	if(view.orienting) return
	if(e.pointerType === "touch") input.activePointers.set(e.pointerId, e)
	input.dragging = true
	input.lastX = e.clientX
	input.lastY = e.clientY

	UI.sky.setPointerCapture(e.pointerId)})

window.addEventListener("pointermove", e => {
	if(view.orienting) return

	if(mode.draw && input.drawing) {
		let path = input.drawPath[input.drawPath.length - 1]
		path.push([e.clientX, e.clientY])
		update.canvas = true
		render()
		return}

	if(input.activePointers.has(e.pointerId)) input.activePointers.set(e.pointerId, e)

	if(mode.draw && input.activePointers.size) {
		input.activePointers.clear()
		input.pinchStartDist = null
		return}

	if(input.activePointers.size === 2) {
		let [p1, p2] = [...input.activePointers.values()]
		let d = Math.hypot(p1.clientX - p2.clientX, p1.clientY - p2.clientY)
		if(input.pinchStartDist === null) {input.pinchStartDist = d; return}
		let s = d / input.pinchStartDist
		input.pinchStartDist = d
		zoomInOut(s)
		return}

	if(mode.draw || !input.dragging) return

	let x = e.clientX
	let y = e.clientY
	let dx = x - input.lastX
	let dy = y - input.lastY
	input.lastX = x
	input.lastY = y

	let sensitivity = 500 / (view.r0 * view.f)
	view.yaw = mod(view.yaw + dx * sensitivity, 360)
	view.pitch = clip(view.pitch + dy * sensitivity, -90, 90)

	update.view = true
	update.canvas = true
	render()})

window.addEventListener("pointerup", e => {
	if(view.orienting) return
	if(mode.draw) input.drawing = false
	input.activePointers.delete(e.pointerId)
	if(input.activePointers.size < 2) input.pinchStartDist = null
	input.dragging = false
	UI.sky.releasePointerCapture(e.pointerId)})

function zoomInOut(scale) {
	view.r0 *= scale
	let base = Math.min(view.w, view.h)
	let rMin = 0.45 * base
	let rMax = 20 * base
	view.r0 = Math.max(rMin, Math.min(rMax, view.r0))
	update.canvas = true
	render()}
